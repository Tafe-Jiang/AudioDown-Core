name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  unit-static:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            web/package-lock.json
            plugin-sdk/node/package-lock.json
      - uses: dtolnay/rust-toolchain@1.88
        with:
          components: clippy,rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: Prepare embedded UI
        working-directory: web
        run: |
          npm ci
          npm run build
      - name: Rust checks
        run: |
          cargo fmt --all -- --check
          cargo test --locked --workspace
          cargo clippy --locked --workspace --all-targets -- -D warnings
      - name: Node SDK tests
        working-directory: plugin-sdk/node
        run: |
          npm ci
          npm test
      - name: Vue checks
        working-directory: web
        run: |
          npm test -- --run
          npm run typecheck
          npm run build

  docker-integration:
    runs-on: ubuntu-latest
    env:
      COMPOSE_PROJECT_NAME: audiodown-${{ github.run_id }}-${{ github.run_attempt }}
      AUDIODOWN_KEEP_CONTAINERS_ON_FAILURE: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Prepare embedded UI
        working-directory: web
        run: |
          npm ci
          npm run build
      - name: Install integration tools
        run: sudo apt-get update && sudo apt-get install -y sqlite3
      - name: Docker integration checks
        run: |
          set +e
          ./tests/compose-smoke.sh &&
          ./tests/virtual-plugin-smoke.sh &&
          ./tests/security-boundary.sh &&
          docker run --rm --ipc=host \
            -v "$PWD/web:/app" -w /app \
            mcr.microsoft.com/playwright:v1.61.1-noble \
            sh -lc 'npm ci && npx playwright test' &&
          # The repository smoke runs tests/plugin-installation-live.spec.ts.
          ./tests/plugin-repository-smoke.sh &&
          ./tests/plugin-installation-security.sh
          status=$?
          if [ "$status" -ne 0 ]; then
            mkdir -p \
              artifacts/compose \
              artifacts/mock-github \
              artifacts/plugin-build \
              artifacts/build-proxy \
              artifacts/runtime-plugin \
              artifacts/playwright \
              artifacts/diagnostics

            # Core/Supervisor logs
            docker compose logs --no-color \
              >artifacts/compose/core-supervisor.log 2>&1 || true
            docker logs audiodown \
              >artifacts/compose/core.log 2>&1 || true
            docker logs audiodown-supervisor \
              >artifacts/compose/supervisor.log 2>&1 || true

            # mock GitHub logs
            for container in $(docker ps -aq --filter "name=github-mock"); do
              docker logs "$container" \
                >"artifacts/mock-github/$container.log" 2>&1 || true
            done

            # plugin build logs
            for container in $(docker ps -aq \
              --filter "label=io.audiodown.resource-role=plugin-build"); do
              docker logs "$container" \
                >"artifacts/plugin-build/$container.log" 2>&1 || true
            done

            # build proxy logs
            for container in $(docker ps -aq \
              --filter "label=io.audiodown.resource-role=plugin-build-proxy"); do
              docker logs "$container" \
                >"artifacts/build-proxy/$container.log" 2>&1 || true
            done

            # runtime plugin logs
            for container in $(docker ps -aq --filter "label=io.audiodown.managed=true"); do
              role="$(docker inspect --format \
                '{{ with index .Config.Labels "io.audiodown.resource-role" }}{{ . }}{{ end }}' \
                "$container" 2>/dev/null || true)"
              if [ -z "$role" ]; then
                docker logs "$container" \
                  >"artifacts/runtime-plugin/$container.log" 2>&1 || true
              fi
            done

            # Playwright report and failed UI screenshots
            cp -R web/playwright-report/. artifacts/playwright/ 2>/dev/null || true
            find web/test-results -type f \
              \( -name '*.png' -o -name '*.webm' -o -name '*.zip' \) \
              -exec cp {} artifacts/playwright/ \; 2>/dev/null || true

            # redacted test diagnostics
            find /tmp -path \
              '*/data/plugins/operations/*.json' -type f \
              -exec cp {} artifacts/diagnostics/ \; 2>/dev/null || true
          fi
          exit "$status"
      - name: Upload failure logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: docker-integration-logs
          path: artifacts/
          if-no-files-found: ignore
      - name: Cleanup
        if: always()
        run: |
          docker ps -aq --filter "label=io.audiodown.managed=true" |
            xargs -r docker rm -f
          docker ps -aq --filter "name=github-mock" |
            xargs -r docker rm -f
          docker rm -f audiodown audiodown-supervisor 2>/dev/null || true
          docker compose down --remove-orphans || true
